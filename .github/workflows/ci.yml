name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: Install commitlint
        run: npm install --save-dev @commitlint/cli @commitlint/config-conventional
      - name: Run commitlint
        if: github.event_name == 'pull_request'
        run: npx commitlint --config ./commitlint.config.js --from ${{ github.event.pull_request.base.sha }} --to HEAD

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: commitlint
    permissions:
      contents: read
      packages: write
    outputs:
      test_image: ${{ steps.meta.outputs.test_image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Compute tags
        id: meta
        run: |
          TEST_IMAGE="ghcr.io/${{ github.repository }}/test:${{ github.sha }}"
          echo "test_image=$TEST_IMAGE" >> $GITHUB_OUTPUT

          PROD_TAGS="ghcr.io/${{ github.repository }}:${{ github.sha }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            PROD_TAGS="$PROD_TAGS,ghcr.io/${{ github.repository }}:latest"
          fi
          echo "prod_tags=$PROD_TAGS" >> $GITHUB_OUTPUT
      - name: Build builder stage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: true
          tags: ${{ steps.meta.outputs.test_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.prod_tags }}
          cache-from: type=gha

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: docker run --rm ${{ needs.build.outputs.test_image }} npm test

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_published: ${{ steps.release.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/git
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag-release:
    name: Tag Release Image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Add version tag
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}:${{ needs.release.outputs.new_release_version }} \
            ghcr.io/${{ github.repository }}:${{ github.sha }}
