name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      - name: Install commitlint
        run: npm install --save-dev @commitlint/cli @commitlint/config-conventional
      - name: Run commitlint
        if: github.event_name == 'pull_request'
        run: npx commitlint --config ./commitlint.config.cjs --from ${{ github.event.pull_request.base.sha }} --to HEAD

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: commitlint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'npm'
      - name: Install dependencies
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run tests
        run: npm run test

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_published: ${{ steps.release.outputs.new_release_published }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_SEMANTIC_RELEASE_ID }}
          private-key: ${{ secrets.APP_SEMANTIC_RELEASE_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      - id: release
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/git
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'npm'
      - name: Install dependencies
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci
      - name: Build Storybook
        run: npm run build-storybook
      - uses: actions/upload-artifact@v7
        with:
          name: storybook-dist
          path: storybook-static/

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - name: Install dependencies
        working-directory: website
        run: npm ci
      - name: Build docs
        working-directory: website
        run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: docs-dist
          path: website/build/

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-storybook, build-docs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Storybook artifact
        uses: actions/download-artifact@v8
        with:
          name: storybook-dist
          path: gh-pages/storybook
      - name: Download docs artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-dist
          path: gh-pages
      - uses: actions/upload-pages-artifact@v5
        with:
          path: gh-pages/
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
